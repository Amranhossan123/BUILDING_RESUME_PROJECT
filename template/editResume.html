{% extends 'master.html' %}

{% block content %}

<div class='container'>
     <h2 class="text-center">Update Resume</h2>

    <form action ="{% url 'updateresume' %}" method="POST" enctype="multipart/form-data" >
        {% csrf_token %}
        <h2>Resume Model</h2>

        <div class="mb-2">
            <input type="text" class="form-control" id="resumeID" value="{{resumedata.id}}" name="resumeID">
          </div>
          <div class="mb-2">
            <label for="profilepicture" class="form-label">Profile Picture</label>
            
            {% if resumedata.ProfilePicture %}
                <img src="{{resumedata.ProfilePicture.url}}" width="70px" alt="">
            {% endif %}
                
            <input type="file" class="form-control" id="profilepicture" name="profilepicture">
          </div>
        <div class="mb-2">
          <label for="fullname" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullname" value="{{resumedata.FullName}}"  name="fullname">
        </div>
        <div class="mb-2">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" value="{{resumedata.Address}}"  name="address">
          </div>

          <div class="mb-2">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" value="{{resumedata.Phone}}"  name="phone">
          </div>
          <div class="mb-2">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" value="{{resumedata.Email}}"  name="email">
          </div>
          <div class="mb-2">
            <label for="careerobjective" class="form-label">CareerObjective</label>
            <input type="text" class="form-control" id="careerobjective" value="{{resumedata.CareerObjective}}"  name="careerobjective">
          </div>
          <div class="mb-2">
            <label for="skills" class="form-label">Skills</label>
            <input type="text" class="form-control" id="skills" value="{{resumedata.Skills}}"  name="skills">
          </div>
          <div class="mb-2">
            <label for="certification" class="form-label">Certification</label>
            <input type="text" class="form-control" id="Certification" value="{{resumedata.Certification}}"  name="certification">
          </div>
          <div class="mb-2">
            <label for="projects" class="form-label">Projects</label>
            <input type="text" class="form-control" id="projects" value="{{resumedata.Project}}"  name="projects">
          </div>
          <div class="mb-2">
            <label for="references" class="form-label">References</label>
            <input type="text" class="form-control" id="references" value="{{resumedata.References}}"  name="references">
          </div>
          <h2> Education Model </h2>

          <div class="mb-2">
            <label for="degree" class="form-label">Degree</label>
            <input type="text" class="form-control" id="degree" value="{{educationdata.Degree}}" name="degree">
          </div>

          <div class="mb-2">
            <label for="institution" class="form-label">Institution</label>
            <input type="text" class="form-control" id="institution" value="{{educationdata.Institution}}" name="institution">
          </div>

          <div class="mb-2">
            <label for="graduationyear" class="form-label">GraduationYear</label>
            <input type="text" class="form-control" id="graduationyear" value="{{educationdata.GraduationYear}}" name="graduationyear">
          </div>

          <h2>Work Model </h2>

          <div class="mb-2">
            <label for="company" class="form-label">Company</label>
            <input type="text" class="form-control" id="company" value="{{workdata.Company}}" name="company">
          </div>

          <div class="mb-2">
            <label for="position" class="form-label">Position</label>
            <input type="text" class="form-control" id="position" value="{{workdata.Position}}" name="position">
          </div>

          <div class="mb-2">
            <label for="startdate" class="form-label">StartDate</label>
            <input type="text" class="form-control" id="startdate" value="{{workdata.StartDate}}"  name="startdate">
          </div>

          <div class="mb-2">
            <label for="enddate" class="form-label">EndDate</label>
            <input type="text" class="form-control" id="enddate" value="{{workdata.EndDate}}"  name="enddate">
          </div>

          <button type="submit" class="btn btn-primary">Update Resume </button>

      </form>

</div>

{% endblock content %}
